---
# install prerequisites for debian
# prometheus-node-exporter
# jq for parsing json
# and curl for testing
# smartmontools for HDD monitoring
- name: Install prerequisites
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - prometheus-node-exporter
    - jq
    - curl
    - smartmontools
  tags: prereq