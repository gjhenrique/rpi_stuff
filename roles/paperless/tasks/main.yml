---
- name: "[paperless] Include compose role"
  ansible.builtin.include_role:
    name: compose
  vars:
    service_name: paperless
    # TODO: handle backup later on
    # backup:
    #   enabled: true
    #   schedule: "0 2 * * *"
    #   directories:
    #     - /home/paperless/documents
    tailscale:
      enabled: "{{ paperless_tailscale_enabled }}"
      hostname: "{{ paperless_tailscale_hostname }}"
      tag: "{{ paperless_tailscale_tag }}"
      https:
        "/": "http://127.0.0.1:8000"
      mounts:
        - /home/paperless/documents:/documents

- name: "[paperless] Create paperless folders"
  ansible.builtin.file:
    path: /home/paperless/documents/{{ item }}
    state: directory
    owner: paperless
    mode: '0755'
  with_items:
    - data
    - media
    - export
    - consume

- name: "[paperless] Backup paperless data"
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_backup_name: paperless
    restic_backup_args: "/home/paperless/documents"
    restic_forget_args: "--keep-last 3"
    restic_schedule: "*-*-* 2:00:00"

- name: "[paperless] Reload systemd daemon"
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_facts.services['compose-paperless.service'] is defined
