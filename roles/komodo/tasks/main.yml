---
- name: Check if git-crypt is installed
  ansible.builtin.command:
    cmd: git-crypt --version
  register: git_crypt_check
  changed_when: false
  failed_when: false
  when: komodo_install_git_crypt | default(true)

- name: Ensure git is installed (dependency for git-crypt)
  ansible.builtin.apt:
    name:
      - git
    update_cache: true
    state: present
  when:
    - komodo_install_git_crypt | default(true)
    - ansible_os_family == 'Debian'

- name: Install git-crypt (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - git-crypt
    update_cache: true
    state: present
  when:
    - komodo_install_git_crypt | default(true)
    - ansible_os_family == 'Debian'
    - git_crypt_check.rc != 0

- name: Install git-crypt (Arch Linux)
  community.general.pacman:
    name:
      - git-crypt
    update_cache: true
    state: present
  when:
    - komodo_install_git_crypt | default(true)
    - ansible_os_family == 'Archlinux'
    - git_crypt_check.rc != 0

- name: Create Komodo root directory
  ansible.builtin.file:
    path: "{{ komodo_root_directory }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
