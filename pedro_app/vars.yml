---
jellyfin_user: "torrent"
emby_user: "torrent"

#torrent_vpn_type: "mullvad"

add_telegram_to_flexget: false
torrent_enable_flexget: false
torrent_enable_radarr: true
torrent_enable_sonaar: true

share_samba_volumes:
  pictures: "[Pictures]; path=/shares/pictures; valid users= pedro; guest ok = no; read only = no; browseable = yes;"
  ro_pictures: "[Pictures RO]; path=/shares/pictures; valid users= tv pedro; guest ok = no; read only = yes; browseable = yes;"
  media: "[Media]; path=/shares/media; valid users= torrent; guest ok = no; read only = no; browseable = yes;"
share_container_volumes:
  - host_path: /home/share/shares/pictures
    container_path: /shares/pictures
    uid: 1000
  - host_path: /home/share/shares/media
    container_path: /shares/media
    uid: 1002
share_photoprism_originals_directory: /home/share/shares/pictures
share_running_in_rpi: true
# Consider donating to https://github.com/sponsors/photoprism
share_photoprism_sponsor: false
share_tailscale_enabled: true

tailscale_version: stable

mount_paths:
  - mount_path: /mnt/external
    mount_from: /dev/sda1
    type: ext4
    options: discard
  - mount_path: /home/torrent/media
    mount_from: /mnt/external/media
    depends: /mnt/external
    user: 1002
    type: None
    options: bind
  - mount_path: /home/share/shares/pictures
    mount_from: /mnt/external/shares
    depends: /mnt/external
    user: 1000
    type: None
    options: bind
  - mount_path: /home/share/shares/media
    mount_from: /mnt/external/media
    depends: /mnt/external
    user: 1002
    type: None
    options: bind
