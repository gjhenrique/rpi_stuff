---
jellyfin_user: "torrent"
# renovate: datasource=docker depName=lscr.io/linuxserver/emby
emby_version: "4.8.10"
emby_user: "torrent"
emby_extra_mounts:
  "/home/torrent/more_media": "/more_media"

# renovate: datasource=docker depName=lscr.io/linuxserver/plex
plex_version: "1.41.6"
plex_user: "torrent"
plex_extra_mounts:
  "/home/torrent/more_media": "/more_media"

#torrent_vpn_type: "mullvad"

# Configure Observability
observability_tailscale_enabled: true
observability_tailscale_hostname: "pedro-observability"
observability_tailscale_tag: "tag:pedro-observability"
observability_enable_adguard_exporter: true
observability_adguard_url: "http://172.17.0.1:8080"
observability_photoprism_monitoring_enabled: true
observability_photoprism_host: "172.17.0.1"
observability_grafana_cloud_enable: true
observability_qingping_enabled: true
observability_prometheus_retention: "390d"
observability_enable_alertmanager: true
# renovate: datasource=docker depName=prom/prometheus
observability_prometheus_version: v3.4.1
# renovate: datasource=docker depName=grafana/grafana
observability_grafana_version: 11.5.2

# Actual Budget - Config
actual_tailscale_tag: "tag:pedro-actual"
actual_tailscale_hostname: "pedro-actual"

# Configure Paperless
paperless_tailscale_enabled: true
paperless_tailscale_hostname: "pedro-paperless"
paperless_tailscale_tag: "tag:pedro-paperless"
paperless_url: "https://pedro-paperless.giraffa-celsius.ts.net"

# Configure automation
add_telegram_to_flexget: false
torrent_enable_flexget: false
torrent_enable_radarr: true
torrent_enable_sonaar: true
torrent_enable_kavita: true
# renovate: datasource=docker depName=docker.io/linuxserver/radarr
radarr_version: 5.26.1-develop
# renovate: datasource=docker depName=docker.io/linuxserver/sonarr
sonarr_version: 4.0.14
# renovate: datasource=docker depName=docker.io/linuxserver/kavita
kavita_version: v0.8.6.2-ls76
# renovate: datasource=docker depName=docker.io/linuxserver/jackett
jackett_version: 0.22.2002
# renovate: datasource=docker depName=docker.io/linuxserver/transmission
transmission_version: 4.0.6-r4-ls295

# Configure media and shares
share_samba_volumes:
  pictures: "[Pictures]; path=/shares/pictures; valid users= pedro; guest ok = no; read only = no; browseable = yes;"
  ro_pictures: "[Pictures RO]; path=/shares/pictures; valid users= tv pedro; guest ok = no; read only = yes; browseable = yes;"
  media: "[Media]; path=/shares/media; valid users= torrent pedro; guest ok = no; read only = no; browseable = yes;"
  extra_media: "[Extra Media]; path=/shares/more_media; valid users= torrent pedro; guest ok = no; read only = no; browseable = yes;"
  documents: "[Documents]; path=/shares/documents; valid users= paperless; guest ok = no; read only = no; browseable = yes;"
share_container_volumes:
  - host_path: /home/share/shares/pictures
    container_path: /shares/pictures
    uid: 1000
  - host_path: /home/share/shares/media
    container_path: /shares/media
    uid: 1002
  - host_path: /home/share/shares/more_media
    container_path: /shares/more_media
    uid: 1002
  # Folder that paperless will import documents from
  - host_path: /mnt/external/documents/consume
    container_path: /shares/documents
    # Match this user with the paperless user of the *container*
    uid: 1000
share_photoprism_originals_directory: /home/share/shares/pictures
share_running_in_rpi: true
# Consider donating to https://github.com/sponsors/photoprism
share_photoprism_sponsor: false
share_tailscale_enabled: true
share_photoprism_cpus: 2

# renovate: datasource=docker depName=tailscale/tailscale
tailscale_version: v1.84

mount_paths:
  - mount_path: /mnt/external
    mount_from: /dev/sda1
    type: ext4
    options: discard
  - mount_path: /home/torrent/media
    mount_from: /mnt/external/media
    depends: /mnt/external
    user: 1002
    type: None
    options: bind
  - mount_path: /home/share/shares/pictures
    mount_from: /mnt/external/shares
    depends: /mnt/external
    user: 1000
    type: None
    options: bind
  - mount_path: /home/paperless/documents
    mount_from: /mnt/external/documents
    depends: /mnt/external
    user: paperless
    type: None
    options: bind
  # Photoprism storage
  - mount_path: /home/share/shares/photoprism_storage
    mount_from: /mnt/external/data/photoprism
    depends: /mnt/external
    user: 1003
    type: None
    options: bind
  - mount_path: /home/share/shares/media
    mount_from: /mnt/external/media
    depends: /mnt/external
    user: 1002
    type: None
    options: bind
  # NTFS HDD - Media and other files
  - mount_path: /mnt/media
    mount_from: /dev/sdb1
    type: ntfs3
    options: rw,uid=1000,gid=1002,umask=0002
  - mount_path: /home/torrent/more_media
    mount_from: /mnt/media
    depends: /mnt/media
    user: 1002
    type: None
    options: bind
  - mount_path: /home/share/shares/more_media
    mount_from: /mnt/media
    depends: /mnt/media
    user: 1002
    type: None
    options: bind

# Configure Photoprism
share_photoprism_storage: /home/share/shares/photoprism_storage
