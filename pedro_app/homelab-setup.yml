---
- hosts: homelab_servers
  vars:
    zfs_pool_devices:
      - /dev/sda
      - /dev/sdb
    zfs_pool_name: "tank"
    zfs_pool_type: "mirror"
    zfs_pool_mountpoint: "/mnt/tank"
    zfs_pool_properties:
      compression: "lz4"
      atime: "off"
      recordsize: "1M"
      checksum: "sha256"
    # Disable systemd-resolved to free port 53 for AdGuard Home
    boilerplate_disable_systemd_resolved: true
    # Allow DHCP to manage resolv.conf (don't create static file or make it immutable)
    boilerplate_protect_resolv_conf: false
  roles:
    - role: boilerplate
      tags: boilerplate
    - role: zfs
      tags: zfs
    - role: komodo
      tags: komodo
